<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Substrix — Disconnected</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .message {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .submessage {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .connect-link { display: inline-block; transition: opacity 0.15s; }
    .connect-link:hover { opacity: 0.9; }
    .connect-link img { display: block; width: 240px; max-width: 100%; height: auto; }
    .footnote {
      margin-top: 28px;
      font-size: 0.78rem;
      color: #888;
    }
    .footnote a { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Substrix</div>
    <p class="message">Your QuickBooks Online company has been disconnected from Substrix.</p>
    <p class="submessage">
      Substrix no longer has access to your QuickBooks data. To start monitoring
      your books health again, reconnect at any time.
    </p>
    <a class="connect-link" href="/connect" aria-label="Connect to QuickBooks">
      <img src="/assets/C2QB_green_btn_lg_default.png" alt="Connect to QuickBooks" />
    </a>
    <p class="footnote">
      Questions? <a href="mailto:i@15446.com?subject=Substrix%20Support">Contact support</a>
    </p>
  </div>
</body>
</html>
