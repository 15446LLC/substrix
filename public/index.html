<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentri — Books Health</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 36px;
    }
    .connect-btn {
      display: inline-block;
      background: #2ca01c;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .connect-btn:hover { background: #228a17; }
    .footnote {
      margin-top: 28px;
      font-size: 0.78rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sentri</div>
    <p class="tagline">Books health monitoring for QuickBooks Online</p>
    <a class="connect-btn" href="/connect">Connect to QuickBooks</a>
    <p class="footnote">You'll be redirected to Intuit to authorize access.</p>
  </div>
</body>
</html>
